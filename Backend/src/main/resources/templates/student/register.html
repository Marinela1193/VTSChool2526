<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - VT Institute</title>

    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div class="vt-card">
        <h1>Register</h1>
        <p class="welcome-text">Sign in</p>
        <form th:action="@{/student/register}" method="post">
            <div>
                <label for="idcard">IdCard:</label>
                <input type="text" id="idcard" name="idcard" class="input-field"
                       placeholder="Please enter your IdCard" required>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="input-field"
                       placeholder="Please enter a valid email" required>
            </div>

            <button type="submit" class="btn-container">
                Register
            </button>
        </form>
        <div th:if="${param.error}" class="error-msg">
            Invalid credentials. Please try again.
        </div>
    </div>
</body>
</html>
